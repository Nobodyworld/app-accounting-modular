name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 (2024-12-10)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5.3.0 (2024-12-10)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run quality gate and tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          set -o pipefail
          python -m src.tools.quality_gate 2>&1 | tee quality-gate.log

      - name: Capture formatter diff
        if: failure()
        run: |
          python -m ruff format --diff src/apps/api/services/ledger_service.py tests/test_ledger_api_invariants.py > ruff-format.diff || true

      - name: Run accounting control suites
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest -q tests/test_ledger_service.py tests/test_data_snapshot_service.py tests/test_modular_accounting_snapshot.py tests/test_modular_accounting_controls.py

      - name: Upload audit artifact
        # actions/upload-artifact v4.6.2 (2024-12-10)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: audit-latest-python-${{ matrix.python-version }}
          path: |
            docs/reports/audit-latest.md
            quality-gate.log
            ruff-format.diff
          if-no-files-found: error
