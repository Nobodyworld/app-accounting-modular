name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 (2024-12-10)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5.3.0 (2024-12-10)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run quality gate and tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m src.tools.quality_gate > quality-gate.log 2>&1

      - name: Show quality-gate log tail
        if: always()
        run: tail -n 160 quality-gate.log || true

      - name: Run accounting control suites
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest -q tests/test_ledger_service.py tests/test_data_snapshot_service.py tests/test_modular_accounting_snapshot.py tests/test_modular_accounting_controls.py

      - name: Upload quality evidence
        # actions/upload-artifact v7.0.1 (2026-06-30)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: quality-evidence-python-${{ matrix.python-version }}
          path: |
            docs/reports/audit-latest.md
            coverage.xml
            coverage.json
            quality-gate.log
          if-no-files-found: error
          retention-days: 14

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 (2024-12-10)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Verify Compose rejects missing JWT secret
        shell: bash
        run: |
          set +e
          env -u MODACCT_JWT_SECRET_KEY docker compose -p modacct-ci -f config/docker-compose.yml config > compose-missing-secret.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            cat compose-missing-secret.log
            echo "Compose unexpectedly accepted a missing MODACCT_JWT_SECRET_KEY" >&2
            exit 1
          fi
          grep -q "MODACCT_JWT_SECRET_KEY" compose-missing-secret.log

      - name: Generate ephemeral Compose JWT secret
        shell: bash
        run: |
          echo "MODACCT_JWT_SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(48))')" >> "$GITHUB_ENV"

      - name: Validate Compose configuration
        run: docker compose -p modacct-ci -f config/docker-compose.yml config

      - name: Build containers
        run: docker compose -p modacct-ci -f config/docker-compose.yml build

      - name: Start containers
        run: docker compose -p modacct-ci -f config/docker-compose.yml up -d

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -p modacct-ci -f config/docker-compose.yml ps
          docker compose -p modacct-ci -f config/docker-compose.yml logs api
          exit 1

      - name: Wait for Streamlit health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8501/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -p modacct-ci -f config/docker-compose.yml ps
          docker compose -p modacct-ci -f config/docker-compose.yml logs web
          exit 1

      - name: Verify least-privilege runtime
        shell: bash
        run: |
          for service in api web; do
            container_id="$(docker compose -p modacct-ci -f config/docker-compose.yml ps -q "$service")"
            test -n "$container_id"
            image_id="$(docker inspect "$container_id" --format '{{.Image}}')"
            image_user="$(docker image inspect "$image_id" --format '{{.Config.User}}')"
            echo "$service image user: $image_user"
            case "$image_user" in
              10001|10001:10001) ;;
              *) echo "$service image does not declare the expected non-root user" >&2; exit 1 ;;
            esac
            test "$(docker compose -p modacct-ci -f config/docker-compose.yml exec -T "$service" id -u)" = "10001"
            test "$(docker compose -p modacct-ci -f config/docker-compose.yml exec -T "$service" id -g)" = "10001"
            test "$(docker inspect "$container_id" --format '{{.HostConfig.ReadonlyRootfs}}')" = "true"
            docker inspect "$container_id" --format '{{json .HostConfig.CapDrop}}' | grep -q '"ALL"'
            docker inspect "$container_id" --format '{{json .HostConfig.SecurityOpt}}' | grep -q 'no-new-privileges:true'
          done
          if docker compose -p modacct-ci -f config/docker-compose.yml exec -T web sh -c 'touch /app/write-should-fail'; then
            echo "Web container unexpectedly wrote to the read-only application filesystem" >&2
            exit 1
          fi
          docker compose -p modacct-ci -f config/docker-compose.yml exec -T web sh -c 'touch /tmp/write-ok && rm /tmp/write-ok'
          docker compose -p modacct-ci -f config/docker-compose.yml exec -T api sh -c 'touch /data/write-ok && rm /data/write-ok'

      - name: Show container status
        run: docker compose -p modacct-ci -f config/docker-compose.yml ps

      - name: Tear down containers
        if: always()
        run: docker compose -p modacct-ci -f config/docker-compose.yml down -v --remove-orphans
