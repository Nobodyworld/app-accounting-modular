name: Temporary Streamlit width migration

on:
  push:
    branches:
      - ux/streamlit-responsive-accessibility

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        # actions/checkout v4.2.2 (2024-12-10)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ux/streamlit-responsive-accessibility
          persist-credentials: true

      - name: Replace deprecated Streamlit width arguments
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/apps/web/app.py")
          source = path.read_text(encoding="utf-8")
          stretch_count = source.count("use_container_width=True")
          content_count = source.count("use_container_width=False")
          if stretch_count + content_count == 0:
              raise SystemExit("No deprecated Streamlit width arguments were found")

          migrated = source.replace("use_container_width=True", 'width="stretch"')
          migrated = migrated.replace("use_container_width=False", 'width="content"')
          if "use_container_width" in migrated:
              raise SystemExit("A deprecated Streamlit width argument remains")

          path.write_text(migrated, encoding="utf-8")
          print(f"Migrated {stretch_count} stretch and {content_count} content-width calls")
          PY

      - name: Commit migration and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temporary-streamlit-width-migration.yml
          git add src/apps/web/app.py
          git diff --cached --check
          git commit -m "ux: migrate Streamlit width API"
          git push origin HEAD:ux/streamlit-responsive-accessibility
