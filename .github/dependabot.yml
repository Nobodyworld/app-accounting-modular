version: 2
updates:
  # pip ecosystem updates
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 3
    groups:
      minor-patch:
        dependency-type: "minor-or-patch"
      major:
        dependency-type: major
    allow:
      - dependency-type: direct
    auto-merge: false

  # GitHub Actions updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "03:00"
    open-pull-requests-limit: 2
    groups:
      minor-patch:
        dependency-type: "minor-or-patch"
      major:
        dependency-type: major
    allow:
      - dependency-type: direct
    auto-merge: false

  # Docker image updates
  - package-ecosystem: docker
    directory: /config
    schedule:
      interval: weekly
      day: wednesday
      time: "03:00"
    open-pull-requests-limit: 1
    groups:
      minor-patch:
        dependency-type: "minor-or-patch"
      major:
        dependency-type: major
    allow:
      - dependency-type: direct
    auto-merge: false
