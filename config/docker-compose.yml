services:
  api:
    build:
      context: ..
      dockerfile: config/Dockerfile.api
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      MODACCT_DATABASE_URL: sqlite:////data/modacct.db
      MODACCT_JWT_SECRET_KEY: "${MODACCT_JWT_SECRET_KEY:?Set MODACCT_JWT_SECRET_KEY to a stable high-entropy value before starting Compose}"
      MODACCT_LOG_LEVEL: INFO
      MODACCT_LOG_FORMAT: JSON
      MODACCT_TRACING_EXPORTER: disabled
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - modacct-data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: config/Dockerfile.web
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      API_BASE: http://api:8000
    ports:
      - "127.0.0.1:8501:8501"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

volumes:
  modacct-data:
