[tool.black]
line-length = 120
target-version = ["py312"]
include = "(src/apps|src/cli|src/plugins|tests|docs)/.*\\.py$"

[tool.ruff]
line-length = 120
target-version = "py312"
fix = false
show-fixes = true
src = ["src/apps", "src/cli", "src/plugins", "tests"]
respect-gitignore = true

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",  # isort
  "UP", # pyupgrade
  "B",  # flake8-bugbear
]
ignore = [
  "B008",  # allow dependency injection defaults
]

[tool.ruff.lint.isort]
known-first-party = ["src.apps", "src.plugins", "src.cli", "tests"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
pythonpath = ["."]
filterwarnings = [
  "error::sqlalchemy.exc.SADeprecationWarning",
  "ignore::DeprecationWarning:passlib",
  "ignore::altair.utils.deprecation.AltairDeprecationWarning",
]
markers = [
  "asyncio: tests that require an asyncio event loop",
]

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
show_error_codes = true
pretty = true
color_output = true
mypy_path = ["."]
files = [
  "src/apps/api/config.py",
  "src/apps/api/services/forecast_service.py",
  "src/apps/api/audit.py",
  "src/apps/api/dependencies.py",
  "src/apps/api/db.py",
  "src/apps/api/routers/core.py",
  "src/apps/api/security.py",
  "src/apps/api/services/plugin_loader.py",
  "src/apps/api/services/extension_loader.py",
  "src/apps/api/services/health.py",
  "src/apps/extensions/registry.py",
  "src/apps/observability/health.py",
  "src/apps/observability/metrics.py",
  "src/apps/modular_accounting/application/cache.py",
  "src/apps/modular_accounting/application/scenarios.py",
  "src/apps/modular_accounting/application/snapshots.py",
  "src/apps/modular_accounting/application/telemetry.py",
  "src/cli/macli.py",
]

[[tool.mypy.overrides]]
module = [
  "apscheduler.*",
  "apps.modular_accounting.*",
  "jose.*",
  "passlib.*",
  "pandas.*",
  "requests.*",
  "statsmodels.*",
  "streamlit.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
  "src.apps.api.config",
  "src.apps.api.services.forecast_service",
]
strict = true
