<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="780" viewBox="0 0 1240 780" role="img" aria-labelledby="title desc">
  <title id="title">CLI Snapshot - Consolidated FX, Commodity, and Tax Data</title>
  <desc id="desc">Controlled demonstration terminal snapshot from python -m cli.macli snapshot --format table.</desc>
  <rect width="1240" height="780" fill="#11161b"/>
  <rect x="22" y="20" width="1196" height="740" rx="10" ry="10" fill="#0b0f13" stroke="#38424d"/>
  <circle cx="44" cy="42" r="7" fill="#ff5f57"/>
  <circle cx="66" cy="42" r="7" fill="#ffbd2f"/>
  <circle cx="88" cy="42" r="7" fill="#28c840"/>
  <text x="108" y="47" fill="#99a7b5" font-family="Consolas, 'Courier New', monospace" font-size="16">PowerShell - Controlled Demo Data</text>

  <g fill="#dbe7f2" font-family="Consolas, 'Courier New', monospace" font-size="20">
    <text x="46" y="86">PS&gt; $env:PYTHONPATH = "$PWD\src"</text>
    <text x="46" y="114">PS&gt; python -m cli.macli snapshot --base USD --commodity XAU --jurisdiction US --format table</text>
  </g>

  <g fill="#9fd3ff" font-family="Consolas, 'Courier New', monospace" font-size="19">
    <text x="46" y="164">SNAPSHOT SUMMARY</text>
    <text x="46" y="192">provider_provenance: fx_openexchangerates | market_commodities | tax_us_tables</text>
    <text x="46" y="220">cache_stats: hits=2 misses=5 ttl_seconds=300</text>
  </g>

  <g fill="#f2f6fa" font-family="Consolas, 'Courier New', monospace" font-size="18">
    <text x="46" y="268">+----------------------+------------------------+----------------------+</text>
    <text x="46" y="294">| section              | key                    | value                |</text>
    <text x="46" y="320">+----------------------+------------------------+----------------------+</text>
    <text x="46" y="346">| fx_rates             | EUR/USD                | 1.1032               |</text>
    <text x="46" y="372">| fx_rates             | GBP/USD                | 1.2749               |</text>
    <text x="46" y="398">| commodity_quotes     | XAU                    | 2342.10 USD          |</text>
    <text x="46" y="424">| tax_rules            | US/FED/STD_CORP        | 21.0%                |</text>
    <text x="46" y="450">| diagnostics          | stale_sections         | []                   |</text>
    <text x="46" y="476">| diagnostics          | missing_sections       | []                   |</text>
    <text x="46" y="502">+----------------------+------------------------+----------------------+</text>
  </g>

  <g fill="#9ae6b4" font-family="Consolas, 'Courier New', monospace" font-size="18">
    <text x="46" y="556">health: ok</text>
    <text x="46" y="582">balanced_controls_ready: true</text>
    <text x="46" y="608">output_format: table</text>
  </g>

  <text x="46" y="664" fill="#c3d0db" font-family="Consolas, 'Courier New', monospace" font-size="17">note: synthetic demo values only. no customer or production financial data.</text>
  <text x="46" y="698" fill="#6f8090" font-family="Consolas, 'Courier New', monospace" font-size="16">Generated for README employer-review evidence.</text>
</svg>